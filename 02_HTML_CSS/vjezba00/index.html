<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abstract Design</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    height: 100vh;
    background: #050505;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    position: relative;
    width: 100vw;
    height: 100vh;
}

.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    mix-blend-mode: screen;
    animation: float 15s infinite ease-in-out alternate;
}

.blob:nth-child(1) {
    width: 400px;
    height: 400px;
    background: #ff006e;
    left: 10%;
    top: 20%;
}

.blob:nth-child(2) {
    width: 500px;
    height: 500px;
    background: #8338ec;
    right: 15%;
    top: 10%;
    animation-duration: 18s;
}

.blob:nth-child(3) {
    width: 450px;
    height: 450px;
    background: #3a86ff;
    left: 30%;
    bottom: 5%;
    animation-duration: 22s;
}

.blob:nth-child(4) {
    width: 350px;
    height: 350px;
    background: #06ffa5;
    right: 20%;
    bottom: 15%;
    animation-duration: 25s;
}

.grid {
    position: absolute;
    inset: 0;
    background:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
}

.glow-ring {
    position: absolute;
    width: 700px;
    height: 700px;
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 50%;
    backdrop-filter: blur(10px);
    animation: spin 40s linear infinite;
}

.center-text {
    position: absolute;
    color: white;
    font-family: Arial, sans-serif;
    font-size: 4rem;
    letter-spacing: 12px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
}

@keyframes float {
    0% {
        transform: translate(0,0) scale(1);
    }
    50% {
        transform: translate(100px,-80px) scale(1.2);
    }
    100% {
        transform: translate(-80px,100px) scale(0.9);
    }
}

@keyframes spin {
    from {
        transform: rotate(0deg);
    }
    to {
        transform: rotate(360deg);
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="grid"></div>

    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>

    <div class="glow-ring"></div>

    <div class="center-text">ABSTRACT</div>
</div>

</body>
</html>
